<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Price Tracker Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #10b981;
            --bg-light: #f8fafc;
            --border: #e2e8f0;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Sarabun', sans-serif;
            color: #1e293b;
            margin: 0;
            padding-bottom: 80px;
        }

        .app-header {
            background: white;
            padding: 18px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .card-custom {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 20px;
            margin-bottom: 16px;
        }

        .form-label { font-weight: 600; font-size: 0.9rem; color: var(--secondary); margin-bottom: 8px; }
        .form-control, .form-select {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }

        .search-area {
            position: sticky;
            top: 65px;
            background: var(--bg-light);
            padding: 10px 0;
            z-index: 900;
        }
        .filter-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .filter-scroll::-webkit-scrollbar { display: none; }
        
        .pill {
            background: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 0.85rem;
            white-space: nowrap;
            color: var(--secondary);
            cursor: pointer;
            transition: 0.2s;
        }
        .pill.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }

        .cat-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 5px;
        }
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .product-item:last-child { border-bottom: none; }
        .p-name { font-weight: 500; font-size: 1rem; }
        .p-price { font-weight: 700; font-size: 1.1rem; color: var(--success); }

        .nav-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            z-index: 1001;
        }
        .nav-btn {
            background: none; border: none; flex: 1;
            color: var(--secondary); font-size: 0.75rem; font-weight: 500;
        }
        .nav-btn i { font-size: 1.6rem; display: block; margin-bottom: 2px; }
        .nav-btn.active { color: var(--primary); }

        .page { display: none; padding: 15px; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-header">
        <h6 class="m-0 fw-bold">PRICE TRACKER <span class="text-primary">PRO</span></h6>
    </div>

    <div id="add-page" class="page active">
        <div class="card-custom">
            <h5 class="fw-bold mb-4">📝 บันทึกราคาใหม่</h5>
            <div class="mb-3">
                <label class="form-label">หมวดหมู่</label>
                <select id="category" class="form-select">
                    <option value="เครื่องปรุง">1. เครื่องปรุง</option>
                    <option value="ของใช้">2. ของใช้</option>
                    <option value="น้ำดื่ม">3. น้ำดื่ม</option>
                    <option value="สุรา">4. สุรา</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">ชื่อรายการสินค้า</label>
                <input type="text" id="itemName" class="form-control" placeholder="เช่น น้ำปลา, สบู่...">
            </div>
            <div class="mb-4">
                <label class="form-label">ราคา (บาท)</label>
                <input type="number" id="itemPrice" class="form-control" placeholder="0.00" inputmode="decimal">
            </div>
            <button onclick="saveData()" class="btn-main" id="saveBtn">บันทึกข้อมูลสินค้า</button>
        </div>
    </div>

    <div id="list-page" class="page">
        <div class="search-area">
            <input type="text" id="searchInput" class="form-control shadow-sm" 
                   placeholder="🔍 ค้นหา (เช่น เม...)" oninput="handleSearch()">
            
            <div class="filter-scroll" id="filterBar">
                <div class="pill active" onclick="setFilter('ทั้งหมด', this)">ทั้งหมด</div>
                <div class="pill" onclick="setFilter('เครื่องปรุง', this)">เครื่องปรุง</div>
                <div class="pill" onclick="setFilter('ของใช้', this)">ของใช้</div>
                <div class="pill" onclick="setFilter('น้ำดื่ม', this)">น้ำดื่ม</div>
                <div class="pill" onclick="setFilter('สุรา', this)">สุรา</div>
            </div>
        </div>

        <div id="displayArea"></div>
    </div>

    <nav class="nav-bottom">
        <button class="nav-btn active" id="btn-add" onclick="switchPage('add')">
            <i class='bx bx-plus-circle'></i><span>เพิ่มข้อมูล</span>
        </button>
        <button class="nav-btn" id="btn-list" onclick="switchPage('list')">
            <i class='bx bx-list-ul'></i><span>รายการ</span>
        </button>
    </nav>

    <script>
        // *** แก้ไข: ใส่ URL Web App ของคุณตรงนี้ ***
        const scriptUrl = 'https://script.google.com/macros/s/AKfycby5YEYiUKHrNp3PVeK5s_E9Fp6AS5uN5NIVK7Df4Y5acRirUHHaFDC1S73eDkDuTME2/exec'; 

        let rawData = [];
        let activeCategory = 'ทั้งหมด';

        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            if(page === 'add') {
                document.getElementById('add-page').classList.add('active');
                document.getElementById('btn-add').classList.add('active');
            } else {
                document.getElementById('list-page').classList.add('active');
                document.getElementById('btn-list').classList.add('active');
                fetchData();
            }
        }

        function setFilter(cat, el) {
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            activeCategory = cat;
            handleSearch();
        }

        // แก้ไข: เปลี่ยนมาใช้ fetch POST แทน google.script.run
        async function saveData() {
            const name = document.getElementById('itemName').value.trim();
            const price = document.getElementById('itemPrice').value;
            const cat = document.getElementById('category').value;

            if(!name || !price) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";

            try {
                const response = await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors', // สำคัญสำหรับ Apps Script
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: cat, name: name, price: price })
                });

                alert("บันทึกสำเร็จ! (ข้อมูลกำลังเดินทางไปยัง Sheets)");
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
            } finally {
                btn.disabled = false; btn.innerText = "บันทึกข้อมูลสินค้า";
            }
        }

        // แก้ไข: เปลี่ยนมาใช้ fetch GET แทน google.script.run
        async function fetchData() {
            document.getElementById('displayArea').innerHTML = '<p class="text-center mt-5 text-muted">กำลังโหลดข้อมูล...</p>';
            try {
                const response = await fetch(scriptUrl);
                rawData = await response.json();
                renderItems(rawData);
            } catch (error) {
                console.error(error);
                document.getElementById('displayArea').innerHTML = '<p class="text-center mt-5 text-danger">ไม่สามารถโหลดข้อมูลจาก Server ได้</p>';
            }
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            const filtered = rawData.filter(item => {
                const name = item[1].toString().toLowerCase();
                const cat = item[0];
                const matchCat = (activeCategory === 'ทั้งหมด' || cat === activeCategory);
                const matchSearch = name.startsWith(query);
                return matchCat && matchSearch;
            });

            renderItems(filtered);
        }

        function renderItems(data) {
            let html = '';
            const cats = ["เครื่องปรุง", "ของใช้", "น้ำดื่ม", "สุรา"];
            let found = false;

            cats.forEach(c => {
                if(activeCategory !== 'ทั้งหมด' && c !== activeCategory) return;
                
                const items = data.filter(d => d[0] === c);
                if(items.length > 0) {
                    found = true;
                    html += `<div class="cat-title">${c}</div>`;
                    html += `<div class="card-custom" style="padding-top:5px; padding-bottom:5px;">`;
                    items.forEach(it => {
                        html += `
                            <div class="product-item">
                                <div class="p-name">${it[1]}</div>
                                <div class="p-price">${Number(it[2]).toLocaleString()} <span style="font-size:0.7rem; font-weight:400;">฿</span></div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            });

            if(!found) html = '<div class="text-center mt-5 text-muted">ไม่พบข้อมูลที่ค้นหา</div>';
            document.getElementById('displayArea').innerHTML = html;
        }
    </script>
</body>
</html>
